# Ansible config for ops/ansible. Run targets via `make` (CONVENTIONS), which
# sets ANSIBLE_CONFIG=ansible.cfg with cwd = ops/ansible.
[defaults]
inventory = inventory/hosts.ini
roles_path = roles
# Local dev vault password lives OUTSIDE git (.vault-pass is gitignored). On
# prod / CI, pass --vault-password-file or set ANSIBLE_VAULT_PASSWORD_FILE.
vault_password_file = .vault-pass
host_key_checking = False
retry_files_enabled = False
stdout_callback = default
interpreter_python = auto_silent

[inventory]
# yaml: prod inventory (inventory/prod.yml, YAML format). ini: legacy dev hosts.ini.
# auto: let ansible pick by file shape. Order = precedence.
enable_plugins = yaml, ini, auto
