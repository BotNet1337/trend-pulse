---
# Deploy the TrendPulse release/ bundle onto the provisioned VPS as a Docker
# Swarm stack. Targets the `prod` group. Same env contract as local (ADR-005 §4).
#
# Flow:
#   checkout app_version → render env into release/env/ → build images tagged
#   app_version → make -C release deploy (render | stack deploy) → deploy-wait
#   (convergence + jobs Complete) → tls role → showcase-init → smoke (gates).
- name: Deploy TrendPulse release bundle (Docker Swarm)
  hosts: prod
  become: true
  gather_facts: true
  vars_files:
    - ../vault/sensitive.vault.yml
  vars:
    app_dir: /opt/trendpulse
    release_dir: "/opt/trendpulse/release"
    # PROD env renders into the release bundle (NOT development) so the bundle is
    # self-contained on the host (Invariant: operators work only from release/).
    env_dir: "/opt/trendpulse/release/env"
  pre_tasks:
    # Ship the application source (release bundle, backend/frontend build contexts,
    # version.env) to the host. Pinned to app_version for a reproducible deploy.
    - name: Check out the application source on the host
      # Run as the deploy user (NOT root): the read-only repo deploy key lives in
      # /home/deploy/.ssh/id_ed25519, and {{ app_dir }} is owned by deploy. Under the
      # play's become:true the task would run as root → wrong HOME (/root/.ssh) →
      # "Permission denied (publickey)". deploy's default SSH key authenticates to
      # GitHub (verified), so no explicit key_file is needed here.
      become: false
      ansible.builtin.git:
        repo: "{{ app_repo_url }}"
        dest: "{{ app_dir }}"
        version: "{{ app_version }}"
        single_branch: true
        depth: 1
        # Reset tracked files to app_version on every deploy. A prior deploy pins
        # APP_VERSION into the tracked release/version.env, leaving the working tree
        # dirty; without force the next checkout fails ("Local modifications exist").
        # Gitignored release/env/ (rendered secrets) is untracked → preserved.
        force: true
        # Trust GitHub's SSH host key on first contact (adds to known_hosts only if
        # absent — safer than StrictHostKeyChecking=no).
        accept_newhostkey: true
  roles:
    # Renders deploy.env + sensitive.env into {{ env_dir }} (= release/env) so the
    # compose `env_file:` paths resolve at `compose config` time.
    - role: env
    # Issues the Let's Encrypt cert on the host + installs the renew timer.
    # Skipped when tls_enabled=false (bare-IP smoke run).
    - role: tls
    # Installs the host→TG alert script + disk/memory check cron (TASK-061).
    # Order matters: AFTER env (script reads rendered sensitive.env creds),
    # BEFORE backup (backup cron fail-hooks call the script).
    - role: host_alerts
    # Installs the daily pg_backup cron job (points at release/scripts).
    - role: backup
  tasks:
    # APP_VERSION flows into version.env so built/deployed images carry the tag.
    - name: Pin APP_VERSION in the release version.env
      ansible.builtin.lineinfile:
        path: "{{ release_dir }}/version.env"
        regexp: '^APP_VERSION='
        line: "APP_VERSION={{ app_version }}"
        state: present

    - name: Build the application images tagged {{ app_version }}
      ansible.builtin.command:
        cmd: >-
          docker compose
          --env-file version.env
          --env-file env/deploy.env
          --env-file env/sensitive.env
          -f docker-compose.yml build
        chdir: "{{ release_dir }}"
      register: build_result
      changed_when: build_result.rc == 0

    - name: Deploy the swarm stack (render | stack deploy)
      ansible.builtin.command:
        cmd: make deploy
        chdir: "{{ release_dir }}"
      register: deploy_result
      changed_when: deploy_result.rc == 0

    - name: Wait for stack convergence (services running + jobs Complete)
      ansible.builtin.command:
        cmd: make deploy-wait
        chdir: "{{ release_dir }}"
      register: deploy_wait_result
      changed_when: false

    # showcase-init (TASK-039) — idempotent. swarm-aware container lookup: find a
    # running api task container on this node and exec the trending bootstrap.
    - name: Find a running api container (swarm task on this node)
      ansible.builtin.shell:
        cmd: >-
          docker ps --filter "label=com.docker.swarm.service.name=trendpulse_api"
          --filter "status=running" --format '{{ "{{" }}.ID{{ "}}" }}' | head -n1
      register: api_container
      changed_when: false

    - name: Showcase-init (subscribe system showcase user to catalog packs)
      ansible.builtin.command:
        cmd: "docker exec {{ api_container.stdout }} python -m api.trending"
      when: api_container.stdout | length > 0
      register: showcase_init
      changed_when: showcase_init.rc == 0

    # Smoke is the LAST task: a non-zero exit fails the deploy (AC4). Swarm has
    # already auto-rolled-back any unhealthy rolling update by this point.
    - name: Smoke test (register → login → watchlist → /ready → /trending)
      ansible.builtin.command:
        cmd: "bash scripts/smoke.sh"
        chdir: "{{ release_dir }}"
      environment:
        # The SPA + /api live at app.<domain> (apex serves the landing site), so
        # smoke targets the app subdomain. Bare-IP (tls off) hits the default server.
        HOST: "{{ 'https://app.' + prod_domain if (tls_enabled | default(true)) else 'http://' + ansible_default_ipv4.address }}"
      register: smoke_result
      changed_when: false
