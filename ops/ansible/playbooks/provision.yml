---
# Provision the VPS host (configure step, after Terraform created it): system
# packages + Docker engine + compose plugin + Docker Swarm init + ufw firewall.
# Targets the `prod` group. Idempotent.
- name: Provision VPS host (Docker + Swarm + firewall)
  hosts: prod
  become: true
  gather_facts: true
  vars:
    # Preflight minimums (warning-only; a small VPS without swap is risky).
    preflight_min_ram_mb: 3500
    preflight_min_disk_gb: 15
    # Docker json-file log rotation (TASK-061): per-container cap = max_size x max_file.
    docker_log_max_size: "10m"
    docker_log_max_file: "3"
  handlers:
    # Fires only when daemon.json content changes (first rollout / threshold edits).
    # NB: restarting dockerd restarts EVERY container on the node (~1-2 min window);
    # swarm re-converges the services on its own. Run inside a deploy window.
    - name: Restart docker
      ansible.builtin.service:
        name: docker
        state: restarted
  tasks:
    # ------------------------------------------------------------------ preflight
    - name: Preflight — assert enough RAM (warn, not hard-fail)
      ansible.builtin.assert:
        that:
          - ansible_memtotal_mb | int >= preflight_min_ram_mb
        success_msg: "RAM OK: {{ ansible_memtotal_mb }} MB"
        fail_msg: >-
          Low RAM: {{ ansible_memtotal_mb }} MB (< {{ preflight_min_ram_mb }} MB
          recommended). The ML worker may OOM. Resize the VPS or add swap.
      ignore_errors: true

    - name: Preflight — compute root filesystem free space (GB)
      ansible.builtin.set_fact:
        root_free_gb: >-
          {{ (ansible_mounts | selectattr('mount', 'equalto', '/')
              | map(attribute='size_available') | first | default(0) | int
              / (1024 * 1024 * 1024)) | round(1) }}

    - name: Preflight — assert enough disk (warn, not hard-fail)
      ansible.builtin.assert:
        that:
          - root_free_gb | float >= preflight_min_disk_gb
        success_msg: "Disk OK: {{ root_free_gb }} GB free on /"
        fail_msg: >-
          Low disk: {{ root_free_gb }} GB free on / (< {{ preflight_min_disk_gb }} GB
          recommended). Image builds + DB + backups need headroom.
      ignore_errors: true

    # ------------------------------------------------------------------ packages
    - name: Install base system packages
      ansible.builtin.package:
        name:
          - ca-certificates
          - curl
          - gnupg
          - ufw
          - git          # host clones the app source (deploy.yml)
          - make         # host runs the release/ Makefile (render | stack deploy)
        state: present

    # Detect a pre-existing engine (cloud-init / owner may have installed docker-ce
    # from Docker's official repo). Installing Ubuntu's docker.io on top conflicts
    # (containerd.io vs containerd), so skip the install when an engine is present.
    - name: Detect existing Docker engine
      ansible.builtin.command: docker --version
      register: docker_preinstalled
      changed_when: false
      failed_when: false

    - name: Install Docker engine + compose plugin (skip when an engine is already present)
      ansible.builtin.package:
        name:
          - docker.io
          - docker-compose-plugin
        state: present
      when: docker_preinstalled.rc != 0

    # ------------------------------------------------------------- log rotation
    # TASK-061: without this, json-file logs grow unbounded and fill the disk.
    # Daemon-level (not per-service compose `logging:`) so future one-shot
    # containers (restore-check, builds) are covered too. Written wholesale via
    # copy — neither TF cloud-init nor ansible creates daemon.json today; if an
    # operator ever hand-adds keys there, they must be merged into this content
    # first (ADR-005: the host is ansible-managed, no manual edits).
    - name: Ensure /etc/docker config directory exists
      ansible.builtin.file:
        path: /etc/docker
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Configure Docker daemon log rotation (json-file, size-capped)
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        owner: root
        group: root
        mode: "0644"
        content: |
          {
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "{{ docker_log_max_size }}",
              "max-file": "{{ docker_log_max_file }}"
            }
          }
      notify: Restart docker

    - name: Ensure Docker service is running and enabled
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    # ------------------------------------------------------------------ swarm init
    # Idempotent: read the current swarm state via `docker info`; init ONLY when it
    # is not already active. advertise-addr = the host's default IPv4.
    - name: Check Docker Swarm state
      ansible.builtin.command:
        cmd: docker info --format '{{ "{{" }}.Swarm.LocalNodeState{{ "}}" }}'
      register: swarm_state
      changed_when: false

    - name: Initialise Docker Swarm (single-node) when not already active
      ansible.builtin.command:
        cmd: "docker swarm init --advertise-addr {{ ansible_default_ipv4.address }}"
      when: swarm_state.stdout | trim != "active"
      register: swarm_init
      changed_when: swarm_init.rc == 0

    # ------------------------------------------------------------------ firewall
    # docker-vs-ufw grapple: Docker writes its own iptables rules in the DOCKER /
    # DOCKER-USER chains, BYPASSING ufw's filter table — ufw governs host-level
    # (non-docker) traffic only. We keep the published surface minimal: nginx
    # publishes 80/443 in `mode: host` (subject to the node firewall, unlike the
    # ingress mesh) and SSH is 22. The default-deny-incoming policy below plus the
    # 22/80/443 allow-list is sufficient for a single-node prod. Tightening the
    # DOCKER-USER chain is a documented hardening follow-up, not required here.
    - name: UFW — default deny incoming
      community.general.ufw:
        direction: incoming
        policy: deny

    - name: UFW — default allow outgoing
      community.general.ufw:
        direction: outgoing
        policy: allow

    - name: UFW — allow SSH/HTTP/HTTPS only (22/80/443)
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "22"
        - "80"
        - "443"

    - name: UFW — enable the firewall
      community.general.ufw:
        state: enabled

    # ------------------------------------------------------------------ fail2ban
    # TASK-061: TF cloud-init installs fail2ban on first boot, but the ansible
    # path (`make deploy` against an already-live or non-TF host) did not
    # guarantee it. Deliberate overlap: on a TF-provisioned host both tasks are
    # 0-changed. Default sshd jail is sufficient (port 22 is key-only, TASK-057);
    # no custom jails. Default bantime is 10 min — a fat-fingered owner login is
    # never a permanent lockout.
    - name: Install fail2ban (SSH brute-force protection)
      ansible.builtin.package:
        name: fail2ban
        state: present

    - name: Ensure fail2ban service is running and enabled
      ansible.builtin.service:
        name: fail2ban
        state: started
        enabled: true
