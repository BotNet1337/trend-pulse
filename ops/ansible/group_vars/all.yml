---
# Non-secret defaults — single source of truth for development/env/deploy.env
# (ADR-005 §4). `make ansible-unpack` renders these (via templates/deploy.env.j2)
# into KEY=value form. Secrets live in vault/sensitive.vault.yml, never here.
postgres_db: trendpulse
postgres_user: trendpulse
postgres_host: postgres
postgres_port: "5432"
# NB: no DATABASE_URL here — the password is secret. The app assembles the DSN
# from POSTGRES_* parts (POSTGRES_PASSWORD comes from sensitive.env / vault).
redis_url: "redis://redis:6379/0"
edge_network: edge
internal_network: internal
postgres_network: postgres_net
redis_network: redis_net
trendpulse_debug: "false"
# Auth (ADR-003) — non-secret access-token TTL in seconds. Secrets (JWT_SECRET,
# OAUTH_STATE_SECRET, GOOGLE_CLIENT_*) live in the vault, never here.
jwt_lifetime_seconds: "3600"
# Local dev serves over plain http (:80, TLS is prod-only) → the auth cookie must
# NOT be Secure or the browser/curl won't send it back. group_vars/prod.yml flips
# this to "true".
auth_cookie_secure: "false"
# Swagger/Redoc/openapi.json gating (TASK-019): ON in dev for DX. SECURITY: the
# full API schema must NOT be exposed in prod — group_vars/prod.yml flips this to
# "false" (the app's Settings default is also False as a code-level safety net).
swagger_enable: "true"
# Prod deploy source (non-secret): the repo the deploy playbook checks out onto the
# VPS, pinned to app_version for reproducible deploys. Override app_version per release.
app_repo_url: "https://github.com/BotNet1337/trend-pulse.git"
app_version: "main"
