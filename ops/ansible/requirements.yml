---
# Galaxy collections used by the playbooks. Install with:
#   ansible-galaxy collection install -r requirements.yml
collections:
  - name: community.docker
    version: ">=3.0.0"
  - name: ansible.posix
    version: ">=1.5.0"
  # community.general provides the `ufw` module used by provision.yml.
  - name: community.general
    version: ">=8.0.0"
