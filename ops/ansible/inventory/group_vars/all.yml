---
# Non-secret defaults — single source of truth for development/env/deploy.env
# (ADR-005 §4). `make ansible-unpack` renders these (via templates/deploy.env.j2)
# into KEY=value form. Secrets live in vault/sensitive.vault.yml, never here.
postgres_db: trendpulse
postgres_user: trendpulse
postgres_host: postgres
postgres_port: "5432"
# NB: no DATABASE_URL here — the password is secret. The app assembles the DSN
# from POSTGRES_* parts (POSTGRES_PASSWORD comes from sensitive.env / vault).
redis_url: "redis://redis:6379/0"
edge_network: edge
internal_network: internal
postgres_network: postgres_net
redis_network: redis_net
trendpulse_debug: "false"
# Auth (ADR-003) — non-secret access-token TTL in seconds. Secrets (JWT_SECRET,
# OAUTH_STATE_SECRET, GOOGLE_CLIENT_*) live in the vault, never here.
jwt_lifetime_seconds: "3600"
# Local dev serves over plain http (:80, TLS is prod-only) → the auth cookie must
# NOT be Secure or the browser/curl won't send it back. group_vars/prod.yml flips
# this to "true".
auth_cookie_secure: "false"
# Swagger/Redoc/openapi.json gating (TASK-019): ON in dev for DX. SECURITY: the
# full API schema must NOT be exposed in prod — group_vars/prod.yml flips this to
# "false" (the app's Settings default is also False as a code-level safety net).
swagger_enable: "true"
# TASK-024: Observability -- non-secret Sentry defaults for dev.
# SENTRY_DSN is a secret; set vault_sentry_dsn in sensitive.vault.yml (empty = off).
app_environment: "dev"
sentry_traces_sample_rate: "0.0"
# Prod deploy source (non-secret): the repo the deploy playbook checks out onto the
# VPS, pinned to app_version for reproducible deploys. Override app_version per release.
app_repo_url: "git@github.com:BotNet1337/trend-pulse.git"
app_version: "main"
# TASK-025: Email -- templates service + SMTP transport. Dev defaults:
#   templates  -> compose service "templates" on port 3100 (internal-only)
#   SMTP       -> mailpit (catch-all, no auth, no TLS)
# Production: override smtp_host/port/starttls via group_vars/prod.yml;
#   smtp_user/password live in vault (sensitive.vault.yml).
templates_service_url: "http://templates:3100"
smtp_host: "mailpit"
smtp_port: "1025"
smtp_from: "TrendPulse <noreply@trendpulse.local>"
smtp_starttls: "false"
frontend_domain: "app.trendpulse.local"
# Frontend base URL for email deeplinks (verify/reset, TASK-026) + templates service.
base_url: "https://app.trendpulse.local"
# TASK-056: Hetzner Object Storage (non-secret). Credentials (S3_ACCESS_KEY/S3_SECRET_KEY)
# live in vault/sensitive.vault.yml. Override s3_endpoint in group_vars/prod.yml.
s3_endpoint: "https://nbg1.your-objectstorage.com"
s3_region: "nbg1"
s3_bucket: "trendpulse-backups"
# TASK-035: TG pool health -- operational minimum healthy accounts. Code default=3.
# Dev/test runs fine with the single session; prod overrides to 1 in prod.yml
# while pool is being expanded (no spam alerts on known single-session setup).
pool_min_healthy: "3"
# TASK-042: Alert feedback 👍/👎 button base URL. Empty = buttons disabled (dev default).
# Prod overrides to the HTTPS domain in group_vars/prod.yml.
public_base_url: ""

# TASK-032 CSRF allow-list (origins permitted on cookie-auth mutations). Dev default.
allowed_origins: "http://localhost,http://localhost:3000,http://localhost:4000"

# TASK-137: account-factory (Layer B) non-secret defaults. SMSPVA_API_KEY is secret (vault).
# Dev = `fake` provider (network-free); prod overrides provider to "" (off) in prod.yml.
# Budget "0.00" = a hard cap that refuses every buy → safe even if a provider is set.
account_factory_provider: "fake"
account_factory_budget_usd: "0.00"
account_factory_probation_days: "14"
account_factory_country: "RU"
account_factory_price_usd: "1.00"
account_factory_tick_interval_seconds: "3600"
account_factory_proxy_pool: ""

# TASK-142: proxy provider (Layer B-proxy) non-secret defaults.
# MOBILEPROXY_API_TOKEN is secret (vault → vault_mobileproxy_api_token).
# Dev = `fake` proxy provider (network-free, 0 spend); prod overrides to "" (off) in prod.yml.
# proxy_price_usd "0.00" = hard cap that refuses every allocation even if provider is set.
# health_probe_channel: public TG channel for pre-promote probe. Empty = skip (fake default).
account_factory_proxy_provider: "fake"
account_factory_proxy_price_usd: "0.00"
account_factory_health_probe_channel: ""
