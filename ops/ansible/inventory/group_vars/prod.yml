---
# Production overrides for the `prod` inventory group (ADR-005 §4). Applied on
# top of all.yml. Non-secret only — secrets stay in the vault.
# Prod serves over HTTPS (nginx TLS) → the auth cookie MUST be Secure.
auth_cookie_secure: "true"
# Prod runs without debug.
trendpulse_debug: "false"
# SECURITY (TASK-019): the full OpenAPI schema / Swagger UI must NOT be exposed in
# prod — docs/redoc/openapi.json return 404. (Settings default is also False.)
swagger_enable: "false"
# SECURITY (TASK-025): prod SMTP uses real credentials → STARTTLS MUST be on so
# user/password are never sent in plaintext (dev/mailpit default is false).
# Resend transactional SMTP (eu-west-1); user/password live in the vault
# (vault_smtp_user=resend, vault_smtp_password=<API key>).
smtp_host: "smtp.resend.com"
smtp_port: "587"
smtp_from: "TrendPulse <noreply@foresignal.biz>"
smtp_starttls: "true"
# TASK-035/059: Pool health target. Целевое значение: 3. Переключить на "3" по
# runbook «Поднять порог» (development/scripts/README.md) — ТОЛЬКО после заполнения пула (TASK-059).
# Set to 1 while only one session is in prod vault so the self-alert does not spam.
pool_min_healthy: "1"
# TASK-042: Production public URL for 👍/👎 feedback buttons in Telegram alerts.
# Must use HTTPS. Matches the Cloudflare-proxied domain provisioned in TF (ADR-005).
public_base_url: "https://foresignal.biz"

# Deployment env tag (Sentry release env / ENVIRONMENT). Prod override.
app_environment: "prod"

# CSRF allow-list — the public SPA origin (app subdomain). Apex serves landing (no auth).
allowed_origins: "https://foresignal.biz,https://app.foresignal.biz"

# TASK-137: account-factory OFF by default in prod (empty provider = no-op tick).
# Activate by setting this to "smspva" AND adding vault_smspva_api_key to the vault,
# AND raising account_factory_budget_usd above 0. See ADR adr-account-factory-provisioning.
account_factory_provider: ""

# TASK-142: proxy provider OFF by default in prod (empty = static pool / no dynamic proxy).
# Activate by setting this to "mobileproxy" AND adding vault_mobileproxy_api_token to the
# vault AND raising account_factory_proxy_price_usd above 0.
# See docs/architecture/adr-proxy-autoprovision.md.
account_factory_proxy_provider: ""
