# Ansible inventory. `localhost` is used by unpack-env.yml to render the env
# files locally (connection: local). The `prod` group is the VPS created by
# ops/terraform/environments/prod (fill ansible_host from the `server_ip`
# Terraform output, or use the gitignored inventory/prod.yml generated from
# environments/prod/save-outputs.sh).
[local]
localhost ansible_connection=local

[prod]
# trendpulse-prod ansible_host=<server_ip> ansible_user=deploy
