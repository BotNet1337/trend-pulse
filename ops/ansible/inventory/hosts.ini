# Ansible inventory. `localhost` is used by unpack-env.yml to render the env
# files locally (connection: local). The `prod` group is the VPS created by
# ops/terraform (fill ansible_host from the `edge_ipv4` Terraform output).
[local]
localhost ansible_connection=local

[prod]
# trendpulse-prod ansible_host=<edge_ipv4> ansible_user=deploy
