# SPA nginx config for TrendPulse frontend container.
# Serves static files from /usr/share/nginx/html.
# All unknown paths fall back to index.html (TanStack Router client-side routing).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with long cache (content-hashed filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Health check endpoint for Docker healthcheck
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # SPA fallback — all routes served from index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
