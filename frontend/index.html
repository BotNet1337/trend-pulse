<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Inter — the Aurora design system font. `display=swap` avoids FOIT; loaded
         as a normal stylesheet so there is NO inline `onload` handler (which the
         strict CSP `script-src-attr 'none'` blocks). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    />
    <link href="/src/app/app.css" rel="stylesheet">
    <title>Foresignal</title>
    <!-- TASK-068: Plausible (cookieless, privacy-first). data-domain matches the
         landing config so foresignal.biz + app.foresignal.biz aggregate into one
         Plausible site. Opt-out: localStorage plausible_ignore = "true". -->
    <script defer data-domain="foresignal.biz" src="https://plausible.io/js/script.js"></script>
    <script src="/theme-script.js"></script>
  </head>
  <body>
    <div id="root"><!--app-html--></div>
    <!--initial-state-->
    <script type="module" src="/src/app/root.tsx"></script>
  </body>
</html>
