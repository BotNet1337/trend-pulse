# Frontend SPA service — TrendPulse dashboard (React + Vite SSR).
# Lives on `internal` only — no published host ports. Traffic reaches it via
# nginx edge (location / { proxy_pass http://frontend_spa; }).
# Waits for the API service to be healthy so SSR health-probe requests resolve.
services:
  frontend:
    image: ${FRONTEND_IMAGE}
    build:
      context: ../../frontend
      args:
        NODE_VERSION: ${NODE_VERSION}
        VITE_BRAND_NAME: ${VITE_BRAND_NAME:-TrendPulse}
        VITE_HELP_URL: ${VITE_HELP_URL:-https://trendpulse.app/docs}
    restart: unless-stopped
    env_file:
      - ../env/deploy.env
    environment:
      NODE_ENV: production
      PORT: "4000"
      # API base for SSR server-side requests (internal network, no nginx hop)
      API_BASE_URL: http://api:8000
    networks:
      - internal
    # NOT in edge; NOT in postgres_net or redis_net — frontend is stateless.
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "require('http').get('http://localhost:4000/health', r =>
          process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      api:
        condition: service_healthy

networks:
  internal:
    external: false
