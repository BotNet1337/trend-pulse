# Frontend SSR service — TrendPulse dashboard (React + Vite + Fastify node-SSR).
# Runs the Fastify SSR server on port 4000 (internal only — no published host ports).
# Traffic reaches it via edge-nginx (location / { proxy_pass http://frontend_spa; }).
# API_URL: internal backend URL for server-side prefetch (cookie-forward auth).
# COOKIE_SECRET: required by @fastify/cookie; injected from env (not hardcoded).
services:
  frontend:
    image: ${FRONTEND_IMAGE}
    build:
      context: ../../frontend
      args:
        NODE_VERSION: ${NODE_VERSION}
        VITE_BRAND_NAME: ${VITE_BRAND_NAME:-Foresignal}
        VITE_HELP_URL: ${VITE_HELP_URL:-https://trendpulse.app/docs}
    restart: unless-stopped
    networks:
      - internal
    # NOT in edge; NOT in postgres_net or redis_net — frontend is stateless.
    environment:
      # Internal backend URL — non-secret; used for SSR prefetch cookie-forward.
      API_URL: http://api:8000
      # Cookie signing secret — must be ≥16 chars; injected from sensitive env.
      # server/config.ts Zod validation will crash the container on startup if absent.
      COOKIE_SECRET: ${FRONTEND_COOKIE_SECRET:?FRONTEND_COOKIE_SECRET is required}
      NODE_ENV: production
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          wget -qO- http://127.0.0.1:4000/healthz || exit 1
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  internal:
    driver: bridge
    internal: true
