# Celery worker. Same app image as api (differs only by command). On
# postgres_net + redis_net + egress; NOT in edge; NO published ports. Declares the
# same `build` so `make build` produces the shared image even if api isn't built
# first. `egress` (non-internal) is the ONLY internet route — the Telegram
# collector (TASK-005) needs MTProto access; api/db/redis stay isolated.
services:
  worker:
    # ml-enabled image (core + sentence-transformers/torch) for the embed
    # pipeline (task-007); api/beat keep the lean ${APP_IMAGE}.
    image: ${APP_IMAGE_ML}
    build:
      context: ../../backend
      args:
        PYTHON_VERSION: ${PYTHON_VERSION}
        UV_VERSION: ${UV_VERSION}
        INSTALL_ML: "true"
    # Consume the default + the batch + scorer queues (TASK-006 routing); without
    # -Q the worker would only drain `celery` and beat-routed batch/score tasks
    # would pile up unconsumed.
    command: celery -A celery_app worker -Q celery,batch,score:global -l info
    restart: unless-stopped
    # Single TG pool session (pool=1): a rolling restart that runs OLD and NEW worker
    # at once makes both connect MTProto on the SAME StringSession -> Telegram raises
    # AuthKeyDuplicatedError (seen on deploy 2026-06-13). stop-first tears the old task
    # down BEFORE the new one starts so they never overlap on the session; the short
    # grace period bounds the old worker's MTProto drain. A few seconds of collect
    # downtime per deploy is acceptable. The durable fix is pool>1 (more sessions).
    stop_grace_period: 10s
    deploy:
      update_config:
        order: stop-first
    env_file:
      - ../env/deploy.env
      - ../env/sensitive.env
    networks:
      - postgres_net
      - redis_net
      - egress
    depends_on:
      redis:
        condition: service_healthy
      pg_vector_provisioner:
        condition: service_completed_successfully
      migration_runner:
        condition: service_completed_successfully

networks:
  postgres_net:
    driver: bridge
    internal: true
  redis_net:
    driver: bridge
    internal: true
  egress:
    driver: bridge
