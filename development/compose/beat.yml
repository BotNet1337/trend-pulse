# Celery beat scheduler. Same app image as api (differs only by command). On
# postgres_net + redis_net; NOT in edge; NO published ports.
services:
  beat:
    image: ${APP_IMAGE}
    build:
      context: ../../backend
      args:
        PYTHON_VERSION: ${PYTHON_VERSION}
        UV_VERSION: ${UV_VERSION}
    command: celery -A celery_app beat -l info
    restart: unless-stopped
    env_file:
      - ../env/deploy.env
      - ../env/sensitive.env
    networks:
      - postgres_net
      - redis_net
    depends_on:
      redis:
        condition: service_healthy
      pg_vector_provisioner:
        condition: service_completed_successfully
      migration_runner:
        condition: service_completed_successfully

networks:
  postgres_net:
    external: false
  redis_net:
    external: false
