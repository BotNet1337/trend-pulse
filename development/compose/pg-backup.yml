# Standalone one-shot services for Postgres backup + restore-check (TASK-034).
#
# Invoked DIRECTLY (not via the root include) by the Makefile backup targets:
#   make backup                 — pg_backup (dump) then backup_uploader (S3 upload)
#   make backup-restore-check  — restore_fetch then restore_check
#
# Self-sufficient: defines the shared temp volume and references postgres_net as
# external (compose creates it as development_postgres_net when the main stack is up).
#
# NOT included in development/docker-compose.yml — standalone-only keeps `make up`
# unaffected and avoids the frontend.yml FRONTEND_COOKIE_SECRET interpolation failure
# when running backup targets without the full env.
#
# Network design:
#   pg_backup         — postgres_net (needs pg_dump access)
#   backup_uploader   — default bridge (needs S3/internet egress; no postgres access)
#   restore_fetch     — default bridge (needs S3/internet egress)
#   restore_check     — default bridge (fully internal throwaway PG; no postgres access)
#
# Versioning: PGVECTOR_IMAGE / AWS_CLI_IMAGE interpolated from version.env.
#
# Least-privilege env (F4):
#   pg_backup       — only PG credentials (no S3, no JWT/OAuth/SMTP/payment secrets)
#   backup_uploader — only S3 credentials (no PG, no other secrets)
#   restore_fetch   — only S3 credentials (no PG, no other secrets)
#   restore_check   — no secrets at all (trust-auth local unix socket)
#
#   The Makefile passes --env-file version.env+deploy.env+sensitive.env so all
#   ${VAR} references below resolve at compose-parse time without ever landing
#   in the environment of services that don't need them.

services:
  # -------------------------------------------------------------------------
  # Backup: Stage 1 — pg_dump -Fc → /tmp/pgdump/dump.tmp
  # -------------------------------------------------------------------------
  pg_backup:
    image: ${PGVECTOR_IMAGE}
    restart: "no"
    profiles: [backup]
    environment:
      STAGE: dump
      # PG credentials only — no S3 / JWT / OAuth / SMTP / payment secrets (F4).
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
    volumes:
      - pgdump_tmp:/tmp/pgdump
      - ../scripts/pg_backup.sh:/scripts/pg_backup.sh:ro
    command: ["bash", "/scripts/pg_backup.sh"]
    networks:
      - postgres_net
    # No depends_on: postgres — this file is standalone; postgres is managed by
    # the main stack (make up).  pg_dump will fail fast if postgres is not reachable.

  # -------------------------------------------------------------------------
  # Backup: Stage 2 — upload dump.tmp → S3; removes temp file on success.
  # -------------------------------------------------------------------------
  backup_uploader:
    image: ${AWS_CLI_IMAGE}
    restart: "no"
    profiles: [backup]
    environment:
      STAGE: upload
      # S3 credentials only — no PG / JWT / OAuth / SMTP / payment secrets (F4).
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
    volumes:
      - pgdump_tmp:/tmp/pgdump
      - ../scripts/pg_backup.sh:/scripts/pg_backup.sh:ro
    entrypoint: ["bash", "/scripts/pg_backup.sh"]
    depends_on:
      pg_backup:
        condition: service_completed_successfully

  # -------------------------------------------------------------------------
  # Restore-check: Stage 1 — fetch latest dump from S3 → shared temp volume.
  # Uses amazon/aws-cli image (has aws CLI, no pg tools needed here).
  # -------------------------------------------------------------------------
  restore_fetch:
    image: ${AWS_CLI_IMAGE}
    restart: "no"
    profiles: [backup]
    environment:
      STAGE: fetch
      # S3 credentials only — no PG / JWT / OAuth / SMTP / payment secrets (F4).
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
    volumes:
      - restore_tmp:/tmp/restore_check
      - ../scripts/pg_restore_check.sh:/scripts/pg_restore_check.sh:ro
    entrypoint: ["bash", "/scripts/pg_restore_check.sh"]

  # -------------------------------------------------------------------------
  # Restore-check: Stage 2 — run throwaway internal PG, pg_restore, smoke checks.
  # Uses pgvector image: has initdb, pg_ctl, pg_restore, psql, createdb.
  # Fully isolated — NOT on postgres_net, NO docker socket.
  # initdb/pg_ctl run as the container's postgres user (entrypoint sets that).
  # No secrets needed — trust-auth local unix socket only (F4).
  # -------------------------------------------------------------------------
  restore_check:
    image: ${PGVECTOR_IMAGE}
    restart: "no"
    profiles: [backup]
    user: postgres
    environment:
      STAGE: check
      RESTORE_CHECK_DB: restore_check
      # No secrets — trust-auth local socket; no PG network, no S3 (F4).
    volumes:
      - restore_tmp:/tmp/restore_check
      - ../scripts/pg_restore_check.sh:/scripts/pg_restore_check.sh:ro
    entrypoint: ["bash", "/scripts/pg_restore_check.sh"]
    depends_on:
      restore_fetch:
        condition: service_completed_successfully

volumes:
  pgdump_tmp:
  restore_tmp:

networks:
  postgres_net:
    name: development_postgres_net
    external: true
