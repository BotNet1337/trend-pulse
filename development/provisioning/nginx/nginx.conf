# Edge reverse-proxy config (mounted read-only into the nginx service).
# Terminates client traffic and proxies:
#   /api/*  → backend api service (strips /api prefix)
#   /       → frontend SPA (SSR server)
# 443/TLS block is present but commented — certs are provisioned on prod via
# ops/terraform; locally we serve on 80 only.
#
# TASK-032: per-route rate-limit zones defined in http{} (AC1/AC2).
# Named zones (no magic literals), sizes 10m. DEV/CI rates — relaxed so the
# Playwright e2e suite (~20 register/login calls from one IP per run, plus
# retries) never trips them; prod-strength limits live in
# release/provisioning/nginx/templates/nginx.conf.template.
#   auth_login   — brute-force guard on login: 60 req/min burst 60 nodelay
#   auth_signup  — signup abuse guard:         60 req/min burst 60 nodelay
#   auth_forgot  — email-spam guard:           60 req/min burst 20 nodelay
#   billing_inv  — payment-abuse guard:        60 req/min burst 20 nodelay
#   api_keys     — API-key creation guard:     60 req/min burst 20 nodelay
# /billing/ipn is intentionally NOT rate-limited (NOWPayments retries).
# /health and /ready are intentionally NOT rate-limited (internal healthchecks).

user  nginx;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Don't leak the nginx version in responses/error pages.
    server_tokens off;

    # Request body cap — guards against oversized uploads (10 MB).
    client_max_body_size 10m;

    # Upstream timeouts (seconds) — fail fast rather than hang on a stuck api.
    proxy_connect_timeout 5s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # ---------------------------------------------------------------------------
    # TASK-032 — per-route rate-limit zones (AC1/AC2).
    # Keyed on binary client IP (4B IPv4 / 16B IPv6, smallest footprint).
    # All blocked requests return 429 (not 503) per limit_req_status below.
    #
    # DEV/CI VALUES — deliberately relaxed. This config serves local dev and the
    # CI e2e stack only: the Playwright suite registers/logs-in ~20 users from a
    # single IP within minutes, so prod-strength limits (5r/m) deterministically
    # 429 the suite. Production limits live in
    # release/provisioning/nginx/templates/nginx.conf.template and stay strict.
    # The zones are kept (not removed) so the 429 path & config shape match prod.
    # ---------------------------------------------------------------------------

    # Login — brute-force guard (prod: 10r/m burst=5).
    limit_req_zone $binary_remote_addr zone=auth_login:10m   rate=60r/m;

    # Register — signup-abuse guard (prod: 5r/m burst=3).
    limit_req_zone $binary_remote_addr zone=auth_signup:10m  rate=60r/m;

    # Forgot-password — email-spam guard (prod: 5r/m burst=3).
    limit_req_zone $binary_remote_addr zone=auth_forgot:10m  rate=60r/m;

    # Billing invoice creation — payment-abuse guard (prod: 5r/m burst=3).
    limit_req_zone $binary_remote_addr zone=billing_inv:10m  rate=60r/m;

    # API-key creation — key-abuse guard (prod: 5r/m burst=3).
    limit_req_zone $binary_remote_addr zone=api_keys:10m     rate=60r/m;

    # All rate-limited zones return HTTP 429 (Too Many Requests) on breach.
    limit_req_status 429;

    # api is reachable by service name on the `internal` docker network.
    upstream trendpulse_api {
        server api:8000;
    }

    # frontend SSR server on `internal` docker network (port 4000).
    upstream frontend_spa {
        server frontend:4000;
    }

    server {
        listen 80;
        server_name _;

        # Security headers (network-design.md §Безопасность).
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        # HSTS: only meaningful over TLS; enabled with the 443 block on prod.
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ---------------------------------------------------------------------------
        # TASK-032 — sensitive route rate-limiting (AC2).
        # Exact-match `location =` takes priority over prefix `location /api/`.
        # nodelay: excess requests are rejected immediately (not queued) so a burst
        # attack gets fast 429s rather than slow queued responses.
        # ---------------------------------------------------------------------------

        # POST /api/v1/auth/jwt/login — brute-force guard.
        location = /api/v1/auth/jwt/login {
            limit_req zone=auth_login burst=60 nodelay;
            proxy_pass http://trendpulse_api/v1/auth/jwt/login;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # POST /api/v1/auth/register — signup-abuse guard.
        location = /api/v1/auth/register {
            limit_req zone=auth_signup burst=60 nodelay;
            proxy_pass http://trendpulse_api/v1/auth/register;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # POST /api/v1/auth/forgot-password — email-spam guard.
        location = /api/v1/auth/forgot-password {
            limit_req zone=auth_forgot burst=20 nodelay;
            proxy_pass http://trendpulse_api/v1/auth/forgot-password;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # POST /api/v1/billing/invoice — payment-abuse guard.
        # /api/v1/billing/ipn is intentionally NOT here (NOWPayments retries must pass).
        location = /api/v1/billing/invoice {
            limit_req zone=billing_inv burst=20 nodelay;
            proxy_pass http://trendpulse_api/v1/billing/invoice;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # /api/v1/api-keys — API-key creation guard (prefix match: covers POST + list).
        location /api/v1/api-keys {
            limit_req zone=api_keys burst=20 nodelay;
            proxy_pass http://trendpulse_api/v1/api-keys;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # /api/* → backend. Trailing slash strips the /api prefix so the backend
        # sees /v1/auth/jwt/login, /v1/watchlists, /v1/openapi.json, etc. at the root.
        # Cookie pass-through: proxy_pass preserves Set-Cookie headers verbatim
        # so the httpOnly fastapiusersauth cookie reaches the browser unchanged.
        location /api/ {
            proxy_pass http://trendpulse_api/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # / → frontend SPA (SSR server). Handles all SPA routes + static assets.
        location / {
            proxy_pass http://frontend_spa;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Prod TLS termination (certs supplied via ops/terraform). Commented locally.
    # TASK-032: rate-limit zones are defined in http{} above and apply here too.
    # server {
    #     listen 443 ssl;
    #     server_name _;
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #     add_header X-Content-Type-Options "nosniff" always;
    #     add_header X-Frame-Options "DENY" always;
    #     add_header Referrer-Policy "no-referrer" always;
    #
    #     # TASK-032 — sensitive routes with per-route rate-limiting (AC2 prod mirror).
