# Edge reverse-proxy config (mounted read-only into the nginx service).
# Terminates client traffic and proxies to the api service on the internal net.
# 443/TLS block is present but commented — certs are provisioned on prod via
# ops/terraform; locally we serve on 80 only.

user  nginx;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Don't leak the nginx version in responses/error pages.
    server_tokens off;

    # Request body cap — guards against oversized uploads (10 MB).
    client_max_body_size 10m;

    # Upstream timeouts (seconds) — fail fast rather than hang on a stuck api.
    proxy_connect_timeout 5s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # api is reachable by service name on the `internal` docker network.
    upstream trendpulse_api {
        server api:8000;
    }

    server {
        listen 80;
        server_name _;

        # Security headers (network-design.md §Безопасность).
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        # HSTS: only meaningful over TLS; enabled with the 443 block on prod.
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            proxy_pass http://trendpulse_api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Prod TLS termination (certs supplied via ops/terraform). Commented locally —
    # no certs available; HSTS lives here.
    # server {
    #     listen 443 ssl;
    #     server_name _;
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #     add_header X-Content-Type-Options "nosniff" always;
    #     add_header X-Frame-Options "DENY" always;
    #     location / {
    #         proxy_pass http://trendpulse_api;
    #         proxy_set_header Host              $host;
    #         proxy_set_header X-Real-IP         $remote_addr;
    #         proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
    # }
}
