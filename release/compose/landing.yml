# Landing (marketing) SSR service — Fastify + Vite SSR on :5174 (internal only;
# no published host ports). Served at the apex domain (foresignal.biz) via
# edge-nginx; the dashboard SPA lives at app.foresignal.biz. Static-ish marketing
# site — no DB deps; SSR-fetches /v1/cases from the api service (TASK-067).
services:
  landing:
    image: ${LANDING_IMAGE}
    build:
      context: ../../landing
      args:
        NODE_VERSION: ${NODE_VERSION}
    networks:
      - internal
    environment:
      NODE_ENV: production
      PORT: "5174"
      # Proof-of-speed section (TASK-067): SSR-fetch of live cases. Internal
      # service-name URL — landing sits on `internal: true` (no egress), so the
      # public https://app.<domain> URL would NOT be reachable from here.
      # Empty/unset = section hidden (graceful).
      CASES_API_URL: http://api:8000/v1/cases
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          wget -qO- http://127.0.0.1:5174/ >/dev/null 2>&1 || exit 1
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
      update_config:
        order: start-first
        failure_action: rollback
        delay: 5s
        monitor: 30s
      rollback_config:
        order: start-first
      restart_policy:
        # `any` (not on-failure): long-running service must survive CLEAN exits too —
        # daemon restart sends SIGTERM, graceful exit 0 = task "Complete", and
        # on-failure never reschedules it (frontend stayed 0/1 in the 2026-06-12 incident).
        condition: any
        delay: 5s
        max_attempts: 0

networks:
  internal:
    driver: overlay
    attachable: true
    internal: true
