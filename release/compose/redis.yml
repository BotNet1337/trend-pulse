# Redis broker/result backend (prod swarm). On redis_net only; NO published ports.
services:
  redis:
    image: redis:${REDIS_VERSION}
    # Explicit maxmemory BELOW the 256M cgroup limit + noeviction (TASK-076).
    # Without a command Redis runs maxmemory=0 (unbounded from its own view) and
    # the kernel OOM-kills it once RSS passes the cgroup cap. noeviction (NOT
    # allkeys-*) is mandatory: Redis is also the Celery broker/result-backend, so
    # a full instance must REJECT writes loudly, never silently evict queued tasks.
    command: redis-server --maxmemory ${REDIS_MAXMEMORY} --maxmemory-policy noeviction
    networks:
      - redis_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
      update_config:
        order: start-first
        failure_action: rollback
      rollback_config:
        order: start-first
      restart_policy:
        condition: any
        delay: 5s

networks:
  redis_net:
    driver: overlay
    attachable: true
    internal: true
