# Celery beat scheduler (prod swarm). Same app image as api (differs only by
# command). On postgres_net + redis_net; NOT in edge; NO published ports.
#
# INVARIANT: replicas MUST be exactly 1. A second beat = a duplicated scheduler =
# every periodic task enqueued twice (double batches). Never scale this service.
services:
  beat:
    image: ${APP_IMAGE}
    build:
      context: ../../backend
      args:
        PYTHON_VERSION: ${PYTHON_VERSION}
        UV_VERSION: ${UV_VERSION}
    # --scheduler HeartbeatScheduler (TASK-098): stamps a TTL'd `beat:heartbeat`
    # Redis key each tick so the healthcheck below can detect a hung-but-alive beat.
    command: celery -A celery_app beat -l info --scheduler scheduler:HeartbeatScheduler
    env_file:
      - ../env/deploy.env
      - ../env/sensitive.env
    networks:
      - postgres_net
      - redis_net
    # Liveness probe (TASK-098): beat has no `inspect ping`. The scheduler stamps
    # `beat:heartbeat` (TTL > 300s max_interval) every tick; a hung beat lets it
    # expire → this probe fails → Swarm reschedules (restart_policy `any` below).
    # Existence check only — the TTL is the freshness window.
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import os,sys,redis;
          sys.exit(0 if redis.Redis.from_url(os.environ.get('REDIS_URL','redis://redis:6379/0')).exists('beat:heartbeat')
          else 1)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      # Strictly 1 — see invariant above. Single scheduler only.
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
      # stop-first guarantees there is never momentarily 2 beat tasks during an
      # update (start-first would briefly run two schedulers → double-enqueue).
      update_config:
        order: stop-first
        failure_action: rollback
        delay: 5s
      rollback_config:
        order: stop-first
      restart_policy:
        # `any` (not on-failure): long-running service must survive CLEAN exits too —
        # daemon restart sends SIGTERM, graceful exit 0 = task "Complete", and
        # on-failure never reschedules it (frontend stayed 0/1 in the 2026-06-12 incident).
        condition: any
        delay: 5s
        max_attempts: 0

networks:
  postgres_net:
    driver: overlay
    attachable: true
    internal: true
  redis_net:
    driver: overlay
    attachable: true
    internal: true
