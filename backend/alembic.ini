# Alembic config. Migrations are run ONLY via the `migration_runner` provisioner
# (`alembic upgrade head`); never inline in app startup. The DB URL is supplied at
# runtime from the environment (see migrations/env.py), not hardcoded here.

[alembic]
script_location = migrations
prepend_sys_path = src
path_separator = os
# sqlalchemy.url is intentionally NOT set here — migrations/env.py reads it from
# the DATABASE_URL environment variable (pydantic Settings).

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
