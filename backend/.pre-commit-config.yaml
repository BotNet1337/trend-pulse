repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
  - repo: local
    hooks:
      - id: ci
        name: ci (ruff format-check + lint + mypy + pytest)
        # pre-commit cwd is the repo root (apps/trendPulse); the root Makefile is
        # the single entry point, so `make ci` is invoked directly.
        entry: make ci
        language: system
        stages: [pre-push]
        pass_filenames: false
