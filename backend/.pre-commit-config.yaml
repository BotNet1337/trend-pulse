repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
  - repo: local
    hooks:
      - id: ci
        name: ci-fast (ruff format-check + lint + mypy + pytest -m 'not integration')
        # pre-commit cwd is the repo root (apps/trendPulse); the root Makefile is
        # the single entry point. ci-fast skips integration tests so the hook
        # never hangs waiting for a postgres/redis instance (TASK-021 AC5).
        # Full `make ci` (with integration + openapi-drift-check) runs in main-integration.yml.
        entry: make ci-fast
        language: system
        stages: [pre-push]
        pass_filenames: false
