name: PR Checks

on:
  pull_request:
    branches: [main]

# Least privilege: PR checks only read the repo (defense-in-depth, not relying on
# the org default). No job here writes contents/packages.
permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # backend: ruff format-check + lint + mypy + unit tests + coverage gate
  # --------------------------------------------------------------------------
  backend:
    name: Backend (lint + type + unit + coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: uv sync --directory backend

      - name: Run ci-fast (fmt-check + lint + mypy + unit tests)
        run: make ci-fast

      - name: Run coverage gate (unit tests, fail_under=80)
        run: make test-cov

  # --------------------------------------------------------------------------
  # integration-smoke: contract-smoke subset of the integration suite against
  # live postgres + redis service containers (TASK-062). Catches route/contract
  # drift (e.g. /v1 prefix) BEFORE merge — the full `-m integration` suite still
  # runs only on push to main (main-integration.yml).
  # --------------------------------------------------------------------------
  integration-smoke:
    name: Backend integration smoke (route contracts)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: trendpulse
          POSTGRES_PASSWORD: trendpulse
          POSTGRES_DB: trendpulse_test
        options: >-
          --health-cmd "pg_isready -U trendpulse -d trendpulse_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: trendpulse
      POSTGRES_PASSWORD: trendpulse
      POSTGRES_DB: trendpulse_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci
      OAUTH_STATE_SECRET: ci
      GOOGLE_CLIENT_ID: ci
      GOOGLE_CLIENT_SECRET: ci
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: uv sync --directory backend

      - name: Run integration smoke (route contract tests)
        run: make test-integration-smoke

  # --------------------------------------------------------------------------
  # openapi-contract: drift check between committed schema and generated types
  # Requires BOTH Python (gen-openapi) and Node (gen-types) toolchains.
  # --------------------------------------------------------------------------
  openapi-contract:
    name: OpenAPI contract drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: uv sync --directory backend

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies (for gen-types)
        run: npm ci
        working-directory: frontend

      - name: Check OpenAPI drift
        run: make openapi-drift-check

  # --------------------------------------------------------------------------
  # frontend: eslint + tsc + vitest unit tests
  # --------------------------------------------------------------------------
  frontend:
    name: Frontend (lint + tsc + unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc -b

      - name: Unit tests (vitest)
        run: npm run test:unit

  # --------------------------------------------------------------------------
  # landing: eslint + build
  # --------------------------------------------------------------------------
  landing:
    name: Landing (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # --------------------------------------------------------------------------
  # templates: eslint + build (email render service, TASK-025)
  # --------------------------------------------------------------------------
  templates:
    name: Templates (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: templates/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # --------------------------------------------------------------------------
  # dep-scan: pip-audit (backend Python) + npm audit (frontend + landing)
  # Threshold: high/critical.
  # NOTE: continue-on-error=true on specific steps where existing unfixable CVEs
  # are present (see TODO comments). Hard-fail where deps are clean.
  # --------------------------------------------------------------------------
  dep-scan:
    name: Dependency security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Export backend requirements from uv.lock
        run: uv export --format requirements-txt --no-emit-project --directory backend > /tmp/backend-req.txt

      - name: pip-audit backend (fail on NEW high+, known CVEs ignored by id)
        # Known upstream CVEs are ignored BY ID (explicit, visible) so the gate
        # still hard-fails on any NEW vulnerability. TODO(TASK-021 follow-up):
        # upgrade pillow>=12.2 (PYSEC-2026-165, CVE-2026-25990/40192/42309/42310/42311)
        # and pytest>=9 (CVE-2025-71176), then drop the matching --ignore-vuln flags.
        run: >-
          uvx --python 3.12 pip-audit -r /tmp/backend-req.txt
          --ignore-vuln PYSEC-2026-165
          --ignore-vuln CVE-2026-25990
          --ignore-vuln CVE-2026-40192
          --ignore-vuln CVE-2026-42309
          --ignore-vuln CVE-2026-42310
          --ignore-vuln CVE-2026-42311
          --ignore-vuln CVE-2025-71176

      - name: npm audit frontend (high+)
        # frontend has 0 vulnerabilities — hard fail on any new high/critical
        run: npm audit --audit-level=high
        working-directory: frontend

      - name: npm audit landing (high+)
        # TODO(TASK-021): landing has 12 vulnerabilities (7 high, 1 critical) in
        # @fastify/middie, fastify, fast-uri, path-to-regexp, minimatch, picomatch, flatted.
        # Some fixes require breaking changes (--force). Track in a dedicated dep-update task.
        # Until resolved, continue-on-error to maintain visibility without blocking PRs.
        run: npm audit --audit-level=high
        working-directory: landing
        continue-on-error: true
